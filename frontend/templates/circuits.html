<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Analysis - Circuits</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .chart-wrapper {
            margin-bottom: 70px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        .pagination-controls {
            text-align: center;
            margin-top: 15px;
        }
        .pagination-controls button {
            padding: 8px 16px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .pagination-controls button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        /* Tooltips */
        .tooltip {
            position: absolute;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('pit_stops_page') }}">Pit Stops</a>
        <a href="{{ url_for('drivers_page') }}">Drivers</a>
        <a href="{{ url_for('circuits_page') }}" class="active">Circuits</a>
        <a href="{{ url_for('seasons_page') }}">Seasons & Constructors</a>
    </nav>

    <div class="container">
        <h1>Circuit Statistics & Analytics</h1>
        <p>Explore the history, locations, and characteristics of Formula 1 tracks.</p>
        <hr>

        <div id="charts-container">
            
            <div class="chart-wrapper">
                <div id="worldMapChart"></div>
                <div id="mapTooltip" class="tooltip"></div>
            </div>

            <div class="chart-wrapper">
                <div id="racesChart"></div>
                <div class="pagination-controls">
                    <button id="prevRacesBtn">&uarr; Previous 10</button>
                    <span id="racesPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                    <button id="nextRacesBtn">&darr; Next 10</button>
                </div>
            </div>

            <div class="chart-wrapper">
                <div id="retirementsChart"></div>
                <div class="pagination-controls">
                    <button id="prevRetBtn">&uarr; Previous 10</button>
                    <span id="retPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                    <button id="nextRetBtn">&darr; Next 10</button>
                </div>
            </div>

            <div class="chart-wrapper">
                <div id="countriesChart"></div>
                <div class="pagination-controls">
                    <button id="prevCtryBtn">&uarr; Previous 10</button>
                    <span id="ctryPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                    <button id="nextCtryBtn">&darr; Next 10</button>
                </div>
            </div>

            <div class="chart-wrapper">
                <div id="driverCircuitChart"></div>
                <div class="pagination-controls">
                    <button id="prevDcBtn">&uarr; Previous 10</button>
                    <span id="dcPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                    <button id="nextDcBtn">&darr; Next 10</button>
                </div>
            </div>

            <div class="chart-wrapper">
                <div id="competitivenessChart"></div>
                <div id="bubbleTooltip" class="tooltip"></div>
            </div>

        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/circuits_main.js') }}"></script>
</body>
</html>
