<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Analysis - Drivers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* Styling for the KPI Summary Boxes */
        .summary-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
        }
        .summary-box {
            background: #f4f4f4;
            border-left: 5px solid #e10600; /* F1 Red */
            padding: 20px 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 250px;
        }
        .summary-title {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .summary-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        .chart-wrapper {
            margin-bottom: 70px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        .pagination-controls {
            text-align: center;
            margin-top: 15px;
        }
        .pagination-controls button {
            padding: 8px 16px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .pagination-controls button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('pit_stops_page') }}">Pit Stops</a>
        <a href="{{ url_for('drivers_page') }}" class="active">Drivers</a>
        <a href="{{ url_for('circuits_page') }}">Circuits</a>
        <a href="{{ url_for('seasons_page') }}">Seasons & Constructors</a>
    </nav>

    <div class="container">
        <h1>Driver Statistics & Analytics</h1>
        
        <div class="summary-container" id="summaryContainer">
            </div>

        <div class="chart-wrapper">
            <div id="nationalityChart"></div>
            <div class="pagination-controls">
                <button id="prevNatBtn">&uarr; Previous 10</button>
                <span id="natPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                <button id="nextNatBtn">&darr; Next 10</button>
            </div>
        </div>

        <div class="chart-wrapper">
            <div id="careerLengthChart"></div>
            <div class="pagination-controls">
                <button id="prevCarBtn">&uarr; Previous 10</button>
                <span id="carPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                <button id="nextCarBtn">&darr; Next 10</button>
            </div>
        </div>

        <div class="chart-wrapper">
            <div id="experiencedChart"></div>
            <div class="pagination-controls">
                <button id="prevExpBtn">&uarr; Previous 10</button>
                <span id="expPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                <button id="nextExpBtn">&darr; Next 10</button>
            </div>
        </div>

        <div class="chart-wrapper">
            <div id="overtakersChart"></div>
            <div class="pagination-controls">
                <button id="prevOveBtn">&uarr; Previous 10</button>
                <span id="ovePageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                <button id="nextOveBtn">&darr; Next 10</button>
            </div>
        </div>

        <div class="chart-wrapper">
            <div id="winPctChart"></div>
            <div class="pagination-controls">
                <button id="prevPctBtn">&uarr; Previous 10</button>
                <span id="pctPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                <button id="nextPctBtn">&darr; Next 10</button>
            </div>
        </div>

        <div class="chart-wrapper">
            <div id="mostWinsChart"></div>
            <div class="pagination-controls">
                <button id="prevWinBtn">&uarr; Previous 10</button>
                <span id="winPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                <button id="nextWinBtn">&darr; Next 10</button>
            </div>
        </div>

    </div>

    <script type="module" src="{{ url_for('static', filename='js/drivers_main.js') }}"></script>
</body>
</html>
