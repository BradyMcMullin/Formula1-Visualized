<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Analysis - Seasons & Constructors</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .chart-wrapper {
            margin-bottom: 70px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        .pagination-controls {
            text-align: center;
            margin-top: 15px;
        }
        .pagination-controls button {
            padding: 8px 16px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .pagination-controls button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('home') }}">Home</a> | 
        <a href="{{ url_for('pit_stops_page') }}">Pit Stops</a> |
        <a href="{{ url_for('drivers_page') }}">Drivers</a> |
        <a href="{{ url_for('circuits_page') }}">Circuits</a> |
        <a href="{{ url_for('seasons_page') }}">Seasons & Constructors</a>
    </nav>

    <div class="container">
        <h1>Seasons & Constructors Analytics</h1>
        <p>Analyze team performance, championship dominance, and seasonal trends over the history of Formula 1.</p>
        
        <hr>

        <div id="charts-container">
            
            <div class="chart-wrapper">
                <div id="winnersChart"></div>
                <div class="pagination-controls">
                    <button id="prevWinBtn">&uarr; Previous 10</button>
                    <span id="winPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                    <button id="nextWinBtn">&darr; Next 10</button>
                </div>
            </div>

            <div class="chart-wrapper">
                <div id="pointsChart"></div>
                <div class="pagination-controls">
                    <button id="prevPtsBtn">&uarr; Previous 10</button>
                    <span id="ptsPageInfo" style="margin: 0 20px; font-weight: bold;"></span>
                    <button id="nextPtsBtn">&darr; Next 10</button>
                </div>
            </div>

        </div>
        
    </div>

    <script type="module" src="{{ url_for('static', filename='js/seasons_main.js') }}"></script>
</body>
</html>
